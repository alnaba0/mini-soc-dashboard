<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mini SOC Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-icon">🛡</div>
        <div>
          <h1>Mini SOC Dashboard</h1>
          <p class="brand-sub">Local sample monitoring dashboard</p>
        </div>
      </div>
      <nav class="nav">
        <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
        <a href="{{ url_for('logs_page') }}" {% if request.endpoint == 'logs_page' %}class="active"{% endif %}>Logs</a>
        <a href="{{ url_for('alerts_page') }}" {% if request.endpoint == 'alerts_page' %}class="active"{% endif %}>Alerts</a>
        <a href="{{ url_for('scans_page') }}" {% if request.endpoint == 'scans_page' %}class="active"{% endif %}>Scans</a>
      </nav>
    </div>
  </header>

  <main class="container page-shell">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
